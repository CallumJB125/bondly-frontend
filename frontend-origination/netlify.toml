[build]
  command = "npm run build"
  publish = "../frontend-origination-dist"

# Cross-app link target so the origination site links to the live Switch site
# (bondly.co.za) in prod instead of falling back to localhost.
[build.environment]
  VITE_SWITCH_URL = "https://bondly.co.za"

[[redirects]]
  from = "/api/*"
  to = "https://bondly.co.za/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

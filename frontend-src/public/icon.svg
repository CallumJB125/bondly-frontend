<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#0e2318"/>
  <!-- Roof -->
  <polygon points="50,14 89,52 11,52" fill="#b8e04a"/>
  <!-- House body -->
  <rect x="17" y="50" width="66" height="32" fill="#b8e04a"/>
  <!-- Arch door -->
  <path d="M42,82 L42,70 A8,8 0 0,1 58,70 L58,82 Z" fill="#0e2318"/>
  <!-- Left window -->
  <rect x="22" y="54" width="13" height="12" rx="2" fill="#0e2318"/>
  <!-- Right window -->
  <rect x="65" y="54" width="13" height="12" rx="2" fill="#0e2318"/>
  <!-- Upward trend in left window -->
  <polyline points="23.5,64.5 26.5,59 30,61.5 34.5,55.5"
    stroke="#b8e04a" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
